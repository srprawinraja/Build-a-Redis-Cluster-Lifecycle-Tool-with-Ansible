---
- hosts: all
  become: yes

  tasks:
    - name: Install Redis build dependencies
      apt:
        name:
          - build-essential
          - wget
          - tcl
        state: present
        update_cache: yes

    - name: Download Redis 7.0.15
      get_url:
        url: https://download.redis.io/releases/redis-7.0.15.tar.gz
        dest: /tmp/redis-7.0.15.tar.gz

    - name: Extract Redis source
      unarchive:
        src: /tmp/redis-7.0.15.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Compile Redis
      command: make
      args:
        chdir: /tmp/redis-7.0.15

    - name: Install Redis
      command: make install
      args:
        chdir: /tmp/redis-7.0.15
    - name: Create Redis config directory
      file:
        path: /etc/redis
        state: directory

    - name: Create redis.conf for cluster mode
      copy:
        dest: /etc/redis/redis.conf
        content: |
          port 6379
          bind 0.0.0.0
          protected-mode no

          daemonize yes
          dir /tmp

          cluster-enabled yes
          cluster-config-file nodes.conf
          cluster-node-timeout 5000

          appendonly yes

    - name: Start Redis server
      shell: redis-server /etc/redis/redis.conf
