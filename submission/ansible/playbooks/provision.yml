---
# Play 1: Install, configure and start Redis on ALL 6 nodes
- hosts: redis_nodes
  become: yes
  roles:
    - role: redis
      vars:
        redis_version: "7.0.15"
        redis_port: 6379
        redis_conf_path: /etc/redis/redis.conf
        redis_data_dir: /tmp


# Play 2: Form the cluster (runs on redis-node-1 only, after all nodes are up)
- hosts: redis-node-1
  become: yes

  tasks:
    - name: Check if cluster is already formed
      shell: redis-cli -h 127.0.0.1 -p 6379 cluster info | grep "cluster_state:ok"
      register: cluster_check
      failed_when: false
      changed_when: false
      args:
        executable: /bin/bash

    - name: Form Redis Cluster (3 masters + 3 replicas)
      shell: |
        redis-cli --cluster create \
          10.10.0.11:6379 \
          10.10.0.12:6379 \
          10.10.0.13:6379 \
          10.10.0.14:6379 \
          10.10.0.15:6379 \
          10.10.0.16:6379 \
          --cluster-replicas 1 \
          --cluster-yes
      when: cluster_check.rc != 0
      args:
        executable: /bin/bash

    - name: Wait for cluster state to be ok
      shell: redis-cli -h 127.0.0.1 -p 6379 cluster info | grep "cluster_state:ok"
      register: cluster_ready
      until: cluster_ready.rc == 0
      retries: 10
      delay: 2
      changed_when: false
      args:
        executable: /bin/bash

    - name: Show final cluster topology
      shell: redis-cli -h 127.0.0.1 -p 6379 cluster nodes
      register: topology
      changed_when: false
      args:
        executable: /bin/bash

    - name: Print cluster topology
      debug:
        msg: "{{ topology.stdout_lines }}"
