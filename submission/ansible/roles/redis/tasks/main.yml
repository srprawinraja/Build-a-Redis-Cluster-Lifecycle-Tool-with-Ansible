---
# tasks/main.yml
# Reusable Redis install + configure + start tasks.
# Called by: provision.yml, upgrade.yml, scale_out.yml

# ── Step 1: Install ──────────────────────────────────────
- name: "REDIS ROLE | Check if Redis {{ redis_version }} binary already compiled"
  stat:
    path: "/tmp/redis-{{ redis_version }}/src/redis-server"
  register: compiled_bin

- name: "REDIS ROLE | Download Redis {{ redis_version }}"
  get_url:
    url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
    dest: "/tmp/redis-{{ redis_version }}.tar.gz"
    validate_certs: no
  when: not compiled_bin.stat.exists

- name: "REDIS ROLE | Extract Redis {{ redis_version }}"
  unarchive:
    src: "/tmp/redis-{{ redis_version }}.tar.gz"
    dest: /tmp
    remote_src: yes
  when: not compiled_bin.stat.exists

- name: "REDIS ROLE | Compile Redis {{ redis_version }}"
  command: make
  args:
    chdir: "/tmp/redis-{{ redis_version }}"
  when: not compiled_bin.stat.exists

- name: "REDIS ROLE | Check if Redis {{ redis_version }} is already installed in /usr/local/bin"
  shell: |
    if [ -f /usr/local/bin/redis-server ] && /usr/local/bin/redis-server --version | grep -q "v={{ redis_version }}"; then
      echo "yes"
    else
      echo "no"
    fi
  register: redis_installed_check
  changed_when: false
  failed_when: false
  args:
    executable: /bin/bash

- name: "REDIS ROLE | Install Redis {{ redis_version }} binaries to /usr/local/bin"
  command: make install
  args:
    chdir: "/tmp/redis-{{ redis_version }}"
  when: redis_installed_check.stdout != "yes"

# ── Step 2: Configure ─────────────────────────────────────
- name: "REDIS ROLE | Ensure config directory exists"
  file:
    path: "{{ redis_conf_path | dirname }}"
    state: directory
    mode: '0755'

- name: "REDIS ROLE | Ensure data directory exists"
  file:
    path: "{{ redis_data_dir }}"
    state: directory
    mode: '0755'

- name: "REDIS ROLE | Write redis.conf from template"
  template:
    src: redis.conf.j2
    dest: "{{ redis_conf_path }}"
  notify: Restart Redis

# ── Step 3: Start ─────────────────────────────────────────
- name: "REDIS ROLE | Check if Redis is running"
  shell: redis-cli -h 127.0.0.1 -p {{ redis_port }} ping 2>/dev/null || true
  register: redis_ping_res
  changed_when: false
  failed_when: false
  args:
    executable: /bin/bash

- name: "REDIS ROLE | Start Redis"
  command: redis-server {{ redis_conf_path }}
  when: "'PONG' not in redis_ping_res.stdout"

- name: "REDIS ROLE | Wait for Redis to be ready on port {{ redis_port }}"
  wait_for:
    host: 127.0.0.1
    port: "{{ redis_port }}"
    timeout: 30
